services:
  - type: web
    name: nestjs-backend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # SERVER_URL: URL public của app trên Render
      # Render sẽ cấp URL dạng https://your-app.onrender.com
      # Điền vào Render Dashboard sau khi deploy lần đầu
      # - key: SERVER_URL
      #   value: https://your-app.onrender.com
